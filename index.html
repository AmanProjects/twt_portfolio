<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="hero"></header>
  <main>
    <section id="summary-section" hidden aria-labelledby="summary-heading">
      <h2 id="summary-heading">Summary</h2>
      <p id="summary"></p>
    </section>
    <section id="experience-section" hidden aria-labelledby="experience-heading">
      <h2 id="experience-heading">Career Timeline</h2>
      <div id="work-list"></div>
    </section>
    <section id="projects-section" hidden aria-labelledby="projects-heading">
      <h2 id="projects-heading">Projects</h2>
      <div id="project-list"></div>
    </section>
    <section id="education-section" hidden aria-labelledby="education-heading">
      <h2 id="education-heading">Education</h2>
      <div id="edu-list"></div>
    </section>
    <section id="certificates-section" hidden aria-labelledby="certificates-heading">
      <h2 id="certificates-heading">Certifications</h2>
      <div id="cert-list"></div>
    </section>
    <section id="skills-section" hidden aria-labelledby="skills-heading">
      <h2 id="skills-heading">Skills</h2>
      <div id="skill-list"></div>
    </section>
    <section id="contact-section" hidden aria-labelledby="contact-heading">
      <h2 id="contact-heading">Get In Touch</h2>
      <a id="contact-btn" class="btn">Email me</a>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
